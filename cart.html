<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Bag | Scents by Sara</title>
    <link rel="stylesheet" href="https://use.typekit.net/ooj6lrz.css">
    <link rel="stylesheet" href="css/design-tokens.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="assets/css/checkout.css">
    <link rel="stylesheet" href="assets/css/cart.css">
</head>

<body>

    <!-- SHARED SITE HEADER -->
    <div data-shared-partial="site-header"></div>

    <main class="page-wrapper cart-page">
        <div class="container">
            <div class="checkout-breadcrumbs">
                    <span class="active">BAG</span> /
                    <span>INFORMATION</span> /
                    <span>SHIPPING</span> /
                    <span>PAYMENT</span>
                </div>
            <div class="cart-header flex-between items-end">
                <h2 class="font-serif">YOUR BAG</h2>
                <a href="shop.html" class="text-micro text-muted underline">CONTINUE SHOPPING</a>
            </div>

            <div class="cart-layout">
                <section class="cart-content">
                    <div id="cart-empty" class="cart-empty hidden">
                        <p>Your bag is currently empty.</p>
                        <a href="shop.html" class="btn-outline mt-6">SHOP CANDLES</a>
                    </div>

                    <div class="cart-table-wrap">
                        <table class="cart-table" aria-label="Shopping cart">
                            <thead>
                                <tr>
                                    <th>PRODUCT</th>
                                    <th>PRICE</th>
                                    <th>QUANTITY</th>
                                    <th>TOTAL</th>
                                </tr>
                            </thead>
                            <tbody id="cart-items-table"></tbody>
                        </table>
                    </div>

                    <div id="cart-mobile-list" class="cart-mobile-list"></div>
                </section>

                <aside class="cart-summary-box" aria-live="polite">
                    <h2>ORDER SUMMARY</h2>
                    <div class="flex-between mb-4">
                        <span class="font-sans">SUBTOTAL</span>
                        <span id="cart-subtotal" class="font-sans cart-total-subtotal">£0.00</span>
                    </div>
                    <div class="flex-between mb-4">
                        <span class="text-sm text-muted">Shipping</span>
                        <span id="cart-shipping" class="font-sans">£0.00</span>
                    </div>
                    <div class="flex-between mb-8">
                        <span class="text-sm text-muted">Tax (VAT)</span>
                        <span id="cart-tax" class="font-sans">£0.00</span>
                    </div>
                    <div class="flex-between mb-8">
                        <span class="font-sans">TOTAL</span>
                        <span id="cart-total" class="font-sans cart-total-grand">£0.00</span>
                    </div>
                    <a href="checkout.html" class="btn-solid w-full block text-center">CHECKOUT</a>
                </aside>
            </div>
        </div>
    </main>

    <!-- SHARED SITE FOOTER -->
    <div data-shared-partial="site-footer"></div>

    <!-- SHARED MOBILE MENU -->
    <div data-shared-partial="mobile-menu"></div>

    <script src="assets/js/cart-state.js"></script>
    <script src="assets/js/shared-layout.js"></script>
    <script src="assets/js/main.js"></script>
    <script src="assets/js/cart.js"></script>
</body>

</html>
